# Generic project config — commit this file.
# Put real site data in project.local.yaml (gitignored).

project:
  name: "YOUR_PROJECT_NAME"
  domain: "example.com"
  origin: "https://example.com"
  locale: "en-US"
  market: "Your city, Your country"

# Data inputs (relative to this repo root)
# When nested inside SEO-as-Code monorepo, defaults point to parent exports.
data_sources:
  gsc_glob: "../data/raw/gsc_*.csv"
  sf_glob: "../data/raw/internos_html.csv"
  # Standalone demo (no parent repo):
  # gsc_glob: "data/samples/gsc_sample.csv"
  # sf_glob: "data/samples/sf_sample.csv"

output:
  reports_dir: "reports/pseo"
